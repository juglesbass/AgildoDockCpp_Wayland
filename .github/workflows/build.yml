name: Build & Test

on:
  push:
    branches: [ main, develop ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build:
    runs-on: ubuntu-latest
    container: archlinux:latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Update system packages
        run: pacman -Syu --noconfirm

      - name: Install dependencies
        run: |
          pacman -S --noconfirm \
            base-devel \
            cmake \
            ninja \
            git \
            extra-cmake-modules \
            kglobalaccel \
            kirigami \
            kwindowsystem \
            layer-shell-qt \
            qt6-base \
            qt6-declarative \
            qt6-shadertools \
            qt6-wayland \
            gcc

      - name: Create build directory
        run: mkdir -p build

      - name: Configure CMake
        run: |
          cd build
          cmake -S .. -B . -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/usr

      - name: Build
        run: |
          cd build
          cmake --build . --parallel

      - name: Run tests
        run: |
          cd build
          QT_QPA_PLATFORM=offscreen LANG=C.UTF-8 ctest --output-on-failure

      - name: Upload build artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: agildodock-build
          path: build/agildodock
          retention-days: 5

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: agildodock-build

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: agildodock
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
